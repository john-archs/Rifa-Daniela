<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rifa Daniela</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background:#FFF7FA;
        padding:20px;
        color:#2d2d2d;
    }

    .tabs{
        display:flex;
        gap:10px;
        margin-bottom:20px;
    }

    .tab-btn{
        border:none;
        background:#FF4F9D;
        color:white;
        padding:10px 16px;
        border-radius:12px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;
    }

    .tab-btn.active{
        background:#B56AD9;
    }

    .tab-content{
        display:none;
    }

    .tab-content.active{
        display:block;
    }

    .formulario{
        background:white;
        padding:20px;
        border-radius:20px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
        margin-bottom:20px;
    }

    .formulario h2{
        margin-bottom:15px;
        color:#2d2d2d;
    }

    .grid-form{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:15px;
    }
    input[type="color"]{
        width:38px !important;
        height:38px !important;
        padding:0 !important;
        border:none !important;
        border-radius:14px;
        overflow:hidden;
        cursor:pointer;
        background:none;
    }
    
    input[type="color"]::-webkit-color-swatch-wrapper{
        padding:0;
    }
    
    input[type="color"]::-webkit-color-swatch{
        border:none;
        border-radius:14px;
    }
    
    input[type="color"]::-moz-color-swatch{
        border:none;
        border-radius:14px;
    }
    input, select{
        width:100%;
        padding:12px;
        border-radius:10px;
        border:2px solid #FFB6D9;
        outline:none;
        font-size:15px;
    }

    button.concluir{
        margin-top:20px;
        width:100%;
        padding:15px;
        background:#FF4F9D;
        color:white;
        border:none;
        border-radius:15px;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    button.concluir:hover{
        background:#B56AD9;
    }

    .cartela{
        display:grid;
        grid-template-columns:repeat(10,1fr);
        gap:8px;
    }

    .numero{
        background:white;
        border:2px solid #2d2d2d;
        border-radius:12px;
        height:55px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-weight:bold;
        transition:0.2s;
        position:relative;
    }

    .numero:hover{
        transform:scale(1.05);
    }

    .numero.selecionado{
        border:3px solid #e6a623;
    }

    .numero.vendido{
        background:#FF4F9D;
        color:white;
        border:none;
    }

    .numero.vendido::after{
        content:'';
        width:40px;
        height:40px;
        background:#B56AD9;
        border-radius:50%;
        position:absolute;
        z-index:0;
    }

    .numero.vendido span{
        z-index:2;
    }

    .resumo{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
        gap:15px;
        margin-bottom:20px;
    }

    .card{
        background:white;
        padding:20px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 0 10px rgba(0,0,0,0.08);
    }

    .card h3{
        color:#2d2d2d;
        margin-bottom:10px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 0 10px rgba(0,0,0,0.08);
    }

    th{
        background:#FF4F9D;
        color:white;
        padding:15px;
    }

    td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #f2d7e8;
    }
.canvas-container{
    width:100%;
    overflow:auto;
    background:white;
    border-radius:20px;
    padding:10px;
    margin-top:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
}
#painelAjuste .linha-ajuste input{
    width:100px !important;
    min-width:100px !important;
}
.linha-ajuste{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
}

.linha-ajuste input{
    width:auto;
    min-width:auto;
    padding:8px 10px;
    font-size:18px;
    text-align:center;
    border-radius:12px;
}

.linha-ajuste label{
    font-size:18px;
    font-weight:bold;
    color:#6A2CA0;
}
#inputImagemRifa{
    font-size:0;
    border:none;
    background:none;
    width:auto;
    padding:0;
}

#inputImagemRifa::file-selector-button{
    background:#ffffff;
    border:2px solid #FFB6D9;
    color:#6A2CA0;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

#blocoQrPix{
    text-align:center;
}

#inputQrPix{
    font-size:0;
    border:none;
    background:none;
    width:auto;
    padding:0;
    display:inline-block;
}

#inputQrPix::file-selector-button{
    background:#ffffff;
    border:2px solid #FFB6D9;
    color:#6A2CA0;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

#rifaCanvas{
    width:100%;
    height:auto;
    display:block;
    border-radius:20px;
}
#blocoImagemRifa{
    text-align:center;
}
.popup-pix{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.popup-conteudo{
    background:#FFF7FA;
    width:90%;
    max-width:420px;
    border-radius:28px;
    padding:30px;
    text-align:center;
    position:relative;
}

.popup-conteudo h2{
    color:#2d2d2d;
    margin-bottom:20px;
}

.fechar-popup{
    position:absolute;
    top:15px;
    right:18px;
    font-size:24px;
    cursor:pointer;
}

.qr-pix{
    width:230px;
    border-radius:20px;
    margin:20px 0;
}

.info-pix{
    font-size:18px;
    margin:10px 0;
    color:#2d2d2d;
    font-weight:bold;
    word-break:break-word;
}

.btn-copiar{
    margin-top:20px;
    background:#FF4F9D;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:16px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<script>

const canvas = document.getElementById('rifaCanvas');
const ctx = canvas.getContext('2d');

const imagem = new Image();

const imagemSalva =
localStorage.getItem('imagemRifa');

if(imagemSalva){

    imagem.src = imagemSalva;

}else{

    imagem.src = 'Rifa.jpg';
}

imagem.onerror = function(){

    alert('Arquivo "Rifa.jpg" não encontrado!');

}

const GRID = {
    x: 66,
    y: 585,
    w: 612,
    h: 625
};

const COLS = 20;
const ROWS = 10;

// CONFIGURAÇÕES DA CARTELA
let configCartela = JSON.parse(
    localStorage.getItem('configCartela')
) || {

    quantidade: 150,
    colunas: 20,
    linhas: 10,
    inicioX: 79,
    inicioY: 970,
    espacoX: 75,
    espacoY: 140,
    fonte: 40,
    cor: '#FF4F9D',          // números
    corRaio: '#FF4F9D',      // vendidos
    corNumeroRaio: '#FFFFFF',
    raio: 32,
    emojiVendido: '💖'
};

let tema = JSON.parse(
    localStorage.getItem('tema')
) || {

    botoes: '#FF4F9D',

    botaoAtual: '#B56AD9',

    botoesAcao: '#FF4F9D',

    fundo: '#FFF7FA',

    cards: '#FFFFFF',

    texto: '#6A2CA0'
};

// MODO AJUSTE
let modoAjuste = JSON.parse(

function desenhar(){

    // GARANTE QUE A IMAGEM CARREGOU
    if(!imagem.complete){

        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // DESENHA IMAGEM
    ctx.drawImage(
        imagem,
        0,
        0,
        canvas.width,
        canvas.height
    );

    // DESENHA NÚMEROS
    desenharNumeros();

    // MARCA VENDIDOS
    numerosMarcados.forEach(numero => {

        marcarNumero(numero);

    });
}

function desenharNumeros(){

    let numero = 1;

    // POSIÇÃO REAL DA SUA GRADE
    const inicioX = configCartela.inicioX;

const inicioY = configCartela.inicioY;

const espacoX = configCartela.espacoX;

const espacoY = configCartela.espacoY;

ctx.fillStyle = configCartela.cor;

ctx.font =
`bold ${configCartela.fonte}px Arial`;

    ctx.textAlign = "center";

    ctx.textBaseline = "middle";

    for(     let linha = 0;     linha < configCartela.linhas;     linha++ ){

        for(     let coluna = 0;     coluna < configCartela.colunas;     coluna++ ){

            const x = inicioX + (coluna * espacoX);

            const y = inicioY + (linha * espacoY);

            ctx.fillText(numero, x, y);

            numero++;
            if(numero > configCartela.quantidade){
            return;
            }
        }
    }
}

function obterPosicao(numero){

    numero = parseInt(numero);

    // POSIÇÃO INICIAL DA GRADE
    const inicioX = configCartela.inicioX;
    const inicioY = configCartela.inicioY;
    
    // ESPAÇAMENTO ENTRE NÚMEROS
    const espacoX = configCartela.espacoX;
    const espacoY = configCartela.espacoY;

    // CÁLCULO DA COLUNA
    const coluna =
    (numero - 1) % configCartela.colunas;
        // CÁLCULO DA LINHA
    const linha = Math.floor(
        (numero - 1) /
        configCartela.colunas
    );
    return {

        x: inicioX + (coluna * espacoX),

        y: inicioY + (linha * espacoY)

    };
}

function marcarNumero(numero){

    const pos = obterPosicao(numero);

    ctx.font =
    `${configCartela.raio * 1.4}px Arial`;

    ctx.textAlign = "center";

    ctx.textBaseline = "middle";

    ctx.fillText(
        configCartela.emojiVendido || '⭐',
        pos.x,
        pos.y
    );
}

function concluirCompra(){

    try{

        let nome = document.getElementById('nome').value;

        let contato = document.getElementById('contato').value;

        let numeros = document.getElementById('numeros').value;

        let pagamento = document.getElementById('pagamento').value;

        if(nome == '' || contato == '' || numeros == ''){

            alert('Preencha todos os campos');

            return;
        }

        // VALIDAR WHATSAPP
        const whatsappLimpo = contato.replace(/\D/g,'');

        if(whatsappLimpo.length != 11){

            alert(
                'Digite um WhatsApp válido.\n\n' +
                'Formato:\n(84) 99999-9999'
            );

            return;
        }

        let lista = numeros.split(',');

        // VERIFICAR REPETIDOS
        let repetidos = [];

        lista.forEach(num => {

            num = num.trim();

            if(numerosMarcados.includes(num)){

                repetidos.push(num);

            }

        });

        if(repetidos.length > 0){

            alert(
                'Os seguintes números já foram escolhidos:\n\n' +
                repetidos.join(', ')
            );

            return;
        }

        // MARCAR NÚMEROS
        lista.forEach(num => {

            numerosMarcados.push(num.trim());

        });

        // DATA
        let data = new Date().toLocaleDateString('pt-BR');

        // QUANTIDADE
        let quantidade = lista.length;

        // TOTAL
        let total = '';

        if(pagamento.includes('R$')){

            const valor = parseFloat(
                pagamento
                .replace('R$','')
                .replace(',','.')
                .trim()
            ) || 0;

            total = 'R$ ' +
            (quantidade * valor).toFixed(2);

        }else{

            total = quantidade + ' unidade(s)';
        }

        // SALVAR VENDA
        vendas.push({

            data,
            nome,
            contato,
            numeros,
            pagamento,
            quantidade,
            total

        });

        // STORAGE
        salvarDados();

        // TABELA
        atualizarTabela();

        // RIFA
        desenhar();

        // LIMPAR
        document.getElementById('nome').value = '';

        document.getElementById('contato').value = '';

        document.getElementById('numeros').value = '';

        alert('Venda registrada!');

    }catch(erro){

        alert(
            'ERRO:\n\n' + erro.message
        );

    }
}
function atualizarTabela(){

    const historico =
    document.getElementById('historico');

    historico.innerHTML = '';

    // RESUMOS
    let resumo = {};

    resumo['Dinheiro'] = 0;

    pagamentos.forEach(item => {

        // IGNORA ITENS MONETÁRIOS
        const numero = parseFloat(
            item.replace(/[^\d,]/g,'')
            .replace(',','.')
        );

        if(isNaN(numero)){

            resumo[item] = 0;

        }

    });

    vendas.forEach((venda, index) => {

        // DINHEIRO
        const valor = parseFloat(

            venda.pagamento
            .replace(/[^\d,]/g,'')
            .replace(',','.')

        );

        if(!isNaN(valor)){

            resumo['Dinheiro'] +=
            venda.quantidade * valor;

        }else{

            if(resumo[venda.pagamento] == undefined){

                resumo[venda.pagamento] = 0;

            }

            resumo[venda.pagamento] +=
            venda.quantidade;
        }

        // TABELA
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${venda.data}</td>
            <td>${venda.nome}</td>
            <td>${venda.numeros}</td>
            <td>${venda.contato}</td>
            <td>${venda.pagamento}</td>
            <td>${venda.total}</td>
            <td>

                <button onclick="editarVenda(${index})">
                    Editar
                </button>

                <button onclick="apagarVenda(${index})">
                    Apagar
                </button>

            </td>
        `;

        historico.appendChild(tr);

    });

    // CARDS
    const resumoCards =
    document.getElementById('resumoCards');

    resumoCards.innerHTML = '';

    Object.keys(resumo).forEach(chave => {

        const card =
        document.createElement('div');

        card.className = 'card';

        let valor = resumo[chave];

        // DINHEIRO
        if(chave == 'Dinheiro'){

            valor = 'R$ ' + valor.toFixed(2);

        }

        card.innerHTML = `
            <h3>${chave}</h3>
            <p>${valor}</p>
        `;

        resumoCards.appendChild(card);

    });

    atualizarSorteio();
}

function sortearNumero(){

    let vendidos = [];

    vendas.forEach(venda => {

        let nums = venda.numeros.split(',');

        nums.forEach(num => {

            vendidos.push({

                numero: parseInt(num.trim()),

                comprador: venda.nome

            });

        });

    });

    if(vendidos.length == 0){

        alert('Nenhum número vendido');

        return;
    }

    const animacao = document
    .getElementById('animacaoSorteio');

    const resultado = document
    .getElementById('resultadoSorteio');

    resultado.innerHTML = '';

    animacao.style.display = 'block';

    let contador = 3;

    animacao.innerHTML = contador;

    let intervalo = setInterval(() => {

        contador--;

        if(contador > 0){

            animacao.innerHTML = contador;

        }else{

            clearInterval(intervalo);

            animacao.innerHTML = '🎉';

            setTimeout(() => {

                animacao.style.display = 'none';

                let sorteado = vendidos[
                    Math.floor(
                        Math.random() * vendidos.length
                    )
                ];

                resultado.innerHTML = `
                
                    Número Sorteado:
                    <br><br>

                    ${sorteado.numero}

                    <br><br>

                    ${sorteado.comprador}

        }

function formatarNumeros(input){

    input.value = input.value
    .replace(/[^0-9,]/g, '');

    // remove vírgulas duplicadas
    input.value = input.value
    .replace(/,+/g, ',');

    // remove vírgula no início
    if(input.value.startsWith(',')){

        input.value = input.value.substring(1);

    }
}

// FORMATAR WHATSAPP
function formatarWhatsApp(input){

    let valor = input.value
    .replace(/\D/g, '');

    // LIMITA 11 DÍGITOS
    valor = valor.substring(0, 11);

    // FORMATA
    if(valor.length > 0){

        valor = '(' + valor;

    }

    if(valor.length > 3){

        valor = valor.slice(0,3) + ') ' +
        valor.slice(3);

    }

    if(valor.length > 10){

        valor = valor.slice(0,10) + '-' +
        valor.slice(10);

    }

    input.value = valor;
}

function salvarHistoricoCor(cor){

    if(!cor){
        return;
    }

    // REMOVE DUPLICADA
    historicoCores =
    historicoCores.filter(c => c !== cor);

    // ADICIONA NO INÍCIO
    historicoCores.unshift(cor);

    // LIMITE 3
    historicoCores =
    historicoCores.slice(0, 3);

    // SALVA
    localStorage.setItem(
        'historicoCores',
        JSON.stringify(historicoCores)
    );

    console.log(
        'Histórico salvo:',
        historicoCores
    );

    atualizarHistoricoCores();
}

    const area =
    document.getElementById('historicoCores');

    if(!area){
        return;
    }

    area.innerHTML = '';

    historicoCores
.filter(cor => cor && cor !== '#000000')
.forEach(cor => {

        const item =
        document.createElement('div');

        item.style.width = '40px';

        item.style.height = '40px';

        item.style.borderRadius = '12px';

        item.style.cursor = 'pointer';

        item.style.border =
        '2px solid #ffffff';

        item.style.boxShadow =
        '0 0 6px rgba(0,0,0,0.25)';

        item.style.background = cor;

        item.title = cor;

        item.onclick = () => {

            configCartela.cor = cor;

            const seletor =
            document.getElementById('ajCor');

            if(seletor){

                seletor.value = cor;

            }

            desenhar();
        };

    });

    );
}

function carregarImagemRifa(event){

    const arquivo =
    event.target.files[0];

    if(!arquivo){
        return;
    }

    const leitor =
    new FileReader();

    leitor.onload = function(e){

        const imagemBase64 =
        e.target.result;

        // SALVA NO LOCALSTORAGE
        localStorage.setItem(
            'imagemRifa',
            imagemBase64
        );

        // ALTERA IMAGEM
        imagem.src = imagemBase64;

        imagem.onload = function(){

            canvas.width = imagem.width;

            canvas.height = imagem.height;

            desenhar();
        };

        atualizarStatusImagem(
            arquivo.name
        );
    };

    leitor.readAsDataURL(arquivo);
}

            );
        }

        // IMAGEM
        

        // QR PIX
        localStorage.setItem(

            urlQr
        );

        // ATUALIZA VARIÁVEIS EM MEMÓRIA
        vendas =
        dados.vendas || [];
        
        numerosMarcados =
        dados.numerosMarcados || [];
        
        pagamentos =
        dados.pagamentos || pagamentos;
        
        configCartela =
        dados.configCartela || configCartela;
        
        historicoCores =
        dados.historicoCores || [];
        
        tema =
        dados.tema || tema;
        
        if(dados.qrPix){
        
            qrPix = dados.qrPix;
        }

        // MARCA COMO INICIALIZADO
        localStorage.setItem(
            'inicializado',
            'sim'
        );

        console.log(
            'Arquivos iniciais carregados!'
        );

    }catch(erro){

        console.log(
            'Erro ao carregar arquivos iniciais:',

        );
    }
}

function baixarArquivo(nome, conteudo, tipo){

    const blob = new Blob(
        [conteudo],
        {
            type: tipo
        }
    );

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement('a');

    a.href = url;

    a.download = nome;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    setTimeout(() => {

        URL.revokeObjectURL(url);

    }, 1000);
}

function exportarConfiguracoes(){

    const dados = {
          vendas,
          numerosMarcados,
          pagamentos,
          configCartela,
          historicoCores,
          tema,
          imagemRifa:
          localStorage.getItem('imagemRifa'),
          qrPix:
          localStorage.getItem('qrPix')
      };

    const json = JSON.stringify(
        dados,
        null,
        2
    );

    baixarArquivo(
        'backup-rifa.json',
        json,
        'application/json'
    );

    alert(
        'Backup exportado com sucesso!'
    );
}

function importarConfiguracoes(event){

    const arquivo =
    event.target.files[0];

    if(!arquivo){
        return;
    }

    const leitor =
    new FileReader();

    leitor.onload = function(e){

        try{

            const dados =
            JSON.parse(e.target.result);

            vendas =
            dados.vendas || [];

            numerosMarcados =
            dados.numerosMarcados || [];

            pagamentos =
            dados.pagamentos || pagamentos;

            configCartela =
            dados.configCartela || configCartela;

            historicoCores =
            dados.historicoCores || [];

            tema =
            dados.tema || tema;

            // IMAGEM
            if(dados.imagemRifa){

                localStorage.setItem(
                    'imagemRifa',
                    dados.imagemRifa
                );

                imagem.src =
                dados.imagemRifa;
            }
            
            // QR PIX
            if(dados.qrPix){
            
                localStorage.setItem(
                    'qrPix',
                    dados.qrPix
                );
            
                qrPix = dados.qrPix;
            }

            // SALVA
            localStorage.setItem(
                'vendas',
                JSON.stringify(vendas)
            );

            localStorage.setItem(
                'numerosMarcados',
                JSON.stringify(numerosMarcados)
            );

            localStorage.setItem(
                'pagamentos',
                JSON.stringify(pagamentos)
            );

            localStorage.setItem(
                'configCartela',
                JSON.stringify(configCartela)
            );

            localStorage.setItem(
                'historicoCores',
                JSON.stringify(historicoCores)
            );
            carregarPagamentos();
            atualizarTabela();
            atualizarPainelAjuste();
            atualizarHistoricoCores();
            desenhar();

            alert(
                'Backup restaurado!'
            );

            location.reload();

        }catch(erro){

            alert(
                'Arquivo inválido.'
            );
        }
    };

    leitor.readAsText(arquivo);
}

let qrPix =
localStorage.getItem('qrPix') || '';

function carregarQrPix(event){

    const arquivo =
    event.target.files[0];

    if(!arquivo){
        return;
    }

    const leitor =
    new FileReader();

    leitor.onload = function(e){

        qrPix = e.target.result;

        localStorage.setItem(
            'qrPix',
            qrPix
        );

        atualizarStatusQrPix(
            arquivo.name
        );
    };

    leitor.readAsDataURL(arquivo);
}
